<div class="container mt-4">
  <h2>{{ isEdit ? 'Editar' : 'Nuevo' }} Proveedor</h2>
  <form [formGroup]="proveedorForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" formControlName="nombre">
    </div>
    <div class="mb-3">
      <label class="form-label">Contacto</label>
      <input type="text" class="form-control" formControlName="contacto">
    </div>
    <div class="mb-3">
      <label class="form-label">Teléfono</label>
      <input type="text" class="form-control" formControlName="telefono">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
    </div>
    <div class="mb-3">
      <label class="form-label">Dirección</label>
      <textarea class="form-control" formControlName="direccion"></textarea>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="proveedorForm.invalid">Guardar</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="cancelar()">Cancelar</button>
  </form>
</div>
