<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-md-9 col-lg-6">
        <div class="card card-custom p-4">
          <div class="text-center mb-4">
            <h2 class="mt-3 title">Registro de Usuario</h2>
            <p class="subtitle">Crear cuenta en el sistema de librería</p>
          </div>

          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-control" formControlName="name" />
            </div>

            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" formControlName="email" />
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" formControlName="password" />
            </div>

            <div class="mb-3">
              <label class="form-label">Rol</label>
              <select class="form-select" formControlName="role">
                <option value="Administrador">Administrador</option>
                <option value="Empleado">Empleado</option>
              </select>
            </div>

            <button type="submit" class="btn btn-main w-100 py-2" [disabled]="loading">
              {{ loading ? 'Registrando...' : 'Registrarse' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <span>¿Ya tienes cuenta? </span>
            <a routerLink="/login" class="register-link">Inicia sesión</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
