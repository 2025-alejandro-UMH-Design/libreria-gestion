<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card card-custom p-4">
          <div class="text-center mb-4">
            <i class="bi bi-book-half auth-icon"></i>
            <h2 class="mt-3 title">Librería - Iniciar Sesión</h2>
            <p class="subtitle">Sistema de Gestión de Inventarios y Compras</p>
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input
                type="email"
                class="form-control"
                formControlName="email"
                placeholder="ejemplo@correo.com"
              />
              <small class="text-danger" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                Ingresa un correo válido.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control"
                formControlName="password"
                placeholder="********"
              />
              <small class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                La contraseña debe tener al menos 6 caracteres.
              </small>
            </div>

            <button type="submit" class="btn btn-main w-100 py-2" [disabled]="loading">
              {{ loading ? 'Ingresando...' : 'Ingresar' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <span>¿No tienes cuenta? </span>
            <a routerLink="/registro" class="register-link">Regístrate</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
