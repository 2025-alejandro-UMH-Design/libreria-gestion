<p>orden-lista works!</p>
<div class="container mt-4">
  <h2>Órdenes de Compra</h2>
  <a routerLink="/ordenes/nueva" class="btn btn-primary mb-3">Nueva Orden</a>

  <!-- Filtro por estado -->
  <div class="row mb-3">
    <div class="col-md-4">
      <label class="form-label">Filtrar por estado:</label>
      <select class="form-select" [(ngModel)]="filtroEstado">
        <option value="">Todos</option>
        <option value="pendiente">Pendiente</option>
        <option value="completada">Completada</option>
        <option value="cancelada">Cancelada</option>
      </select>
    </div>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Proveedor</th>
        <th>Total</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let o of ordenesFiltradas">
        <td>{{ o.id }}</td>
        <td>{{ o.fecha | date:'dd/MM/yyyy' }}</td>
        <td>{{ o.proveedor.nombre }}</td>
        <td>{{ o.total | currency }}</td>
        <td><span class="badge" [ngClass]="getBadgeClass(o.estado)">{{ o.estado | uppercase }}</span></td>
        <td>
          <a [routerLink]="['/ordenes', o.id]" class="btn btn-sm btn-info">Ver</a>
          <button *ngIf="o.estado === 'pendiente'" (click)="cambiarEstado(o.id, 'completada')" class="btn btn-sm btn-success ms-2">Recibir</button>
          <button *ngIf="o.estado === 'pendiente'" (click)="cambiarEstado(o.id, 'cancelada')" class="btn btn-sm btn-danger ms-2">Cancelar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
