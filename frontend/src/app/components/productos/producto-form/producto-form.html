<div class="container mt-4">
  <h2>{{ isEdit ? 'Editar' : 'Nuevo' }} Producto</h2>
  <form [formGroup]="productoForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Código</label>
      <input type="text" class="form-control" formControlName="codigo">
    </div>
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" formControlName="nombre">
    </div>
    <div class="mb-3">
      <label class="form-label">Descripción</label>
      <textarea class="form-control" formControlName="descripcion" rows="3"></textarea>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Precio</label>
        <input type="number" class="form-control" formControlName="precio">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Stock Mínimo</label>
        <input type="number" class="form-control" formControlName="stock_minimo">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Stock Actual</label>
        <input type="number" class="form-control" formControlName="stock_actual">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Categoría</label>
      <input type="text" class="form-control" formControlName="categoria">
    </div>
    <div class="mb-3">
      <label class="form-label">Imagen</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*">
      <!-- Mostrar imagen actual si existe -->
      <div *ngIf="imagenPreview" class="mt-2">
        <img [src]="imagenPreview" alt="Vista previa" style="max-width: 200px; max-height: 200px;">
      </div>
    </div>
    <div class="mb-3" *ngIf="isEdit && productoForm.get('imagen_url')?.value">
      <label>Imagen actual:</label>
      <img [src]="productoForm.get('imagen_url')?.value" style="max-width: 100px; max-height: 100px;" alt="Imagen actual">
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="productoForm.invalid">Guardar</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="cancelar()">Cancelar</button>
  </form>
</div>
